<script>
// ══════════════════════════════════════════
//  CORE LOGIC
// ══════════════════════════════════════════
function createEntry({title,description,location,mood,author,videoClip}){
  if(!title||title.trim()==="") throw new Error("Title is required");
  if(!author) throw new Error("Author is required");
  return{id:`${Date.now()}-${Math.random().toString(36).slice(2,7)}`,title:title.trim(),description:description||"",location:location||"",mood:mood||"😊",author,videoClip:videoClip||"",timestamp:new Date().toISOString(),photo:null};
}
function formatTime(iso){return new Date(iso).toLocaleString("en-US",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"});}
function formatDate(iso){return new Date(iso).toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});}
function groupByDay(entries){
  const sorted=[...entries].sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp));
  const map=new Map();
  for(const e of sorted){const day=new Date(e.timestamp).toDateString();if(!map.has(day))map.set(day,[]);map.get(day).push(e);}
  return[...map.entries()].map(([day,ents],i)=>({dayNumber:i+1,date:day,entries:ents}));
}
function exportSRT(entries){
  if(!entries.length) return"";
  return entries.map((e,i)=>{const p=n=>String(n).padStart(2,"0");const loc=e.location?` · 📍${e.location}`:"";return`${i+1}\n00:${p(i)}:00,000 --> 00:${p(i)}:06,000\n${e.mood} ${e.title}${loc}\n${e.description||""}`;}).join("\n\n");
}
function exportScript(entries){
  if(!entries.length) return"";
  const hdr="🏔️  TORRES DEL PAINE — 5D4N TREK\nVideo Script & CapCut Production Guide\n"+"━".repeat(46);
  const scenes=entries.map((e,i)=>{const clip=e.videoClip?`\n  📹 CLIP FILE  : ${e.videoClip}`:"";const photo=e.photo?"\n  📸 PHOTO      : [attached]":"";return`[SCENE ${i+1}]  ${formatTime(e.timestamp)}\n  📍 LOCATION  : ${e.location||"Unknown"}\n  👤 LOGGED BY : ${e.author}${clip}${photo}\n\n  TITLE       : ${e.mood} ${e.title}\n  NARRATION   : ${e.description||"(no description)"}`;});
  return hdr+"\n\n"+scenes.join("\n\n"+"─".repeat(46)+"\n\n");
}
function getStats(entries){
  if(!entries.length) return{total:0,photos:0,clips:0,byAuthor:{},topMood:null,days:0};
  const byAuthor={},moodCount={};let photos=0,clips=0;
  for(const e of entries){byAuthor[e.author]=(byAuthor[e.author]||0)+1;moodCount[e.mood]=(moodCount[e.mood]||0)+1;if(e.photo)photos++;if(e.videoClip)clips++;}
  const topMood=Object.entries(moodCount).sort((a,b)=>b[1]-a[1])[0]?.[0]||null;
  return{total:entries.length,photos,clips,byAuthor,topMood,days:groupByDay(entries).length};
}
function filterEntries(entries,{author,search}={}){
  return entries.filter(e=>{
    if(author&&e.author!==author) return false;
    if(search){const q=search.toLowerCase();if(![e.title,e.description,e.location].some(f=>f.toLowerCase().includes(q))) return false;}
    return true;
  });
}

function runTests(){

  function assertEq(a,b,m){if(a!==b)throw new Error(m||`Expected "${b}", got "${a}"`);}
  function assertThrows(fn,msg){try{fn();throw new Error("Expected throw");}catch(e){if(e.message==="Expected throw")throw e;if(msg)assertEq(e.message,msg);}}
  function assertContains(s,sub){if(!s.includes(sub))throw new Error(`Expected to contain "${sub}"`);}
  test("createEntry: valid fields",()=>{const e=createEntry({title:"Sunrise",author:"Me"});assertEq(e.title,"Sunrise");assert(e.id);});
  test("createEntry: trims title",()=>assertEq(createEntry({title:"  Towers  ",author:"Me"}).title,"Towers"));
  test("createEntry: throws empty title",()=>assertThrows(()=>createEntry({title:"",author:"Me"}),"Title is required"));
  test("createEntry: throws whitespace title",()=>assertThrows(()=>createEntry({title:"   ",author:"Me"}),"Title is required"));
  test("createEntry: throws missing author",()=>assertThrows(()=>createEntry({title:"X"}),"Author is required"));
  test("createEntry: default mood 😊",()=>assertEq(createEntry({title:"X",author:"Me"}).mood,"😊"));

  test("createEntry: stores videoClip",()=>assertEq(createEntry({title:"X",author:"Me",videoClip:"IMG.MOV"}).videoClip,"IMG.MOV"));

  test("createEntry: unique IDs",()=>{const a=createEntry({title:"A",author:"Me"}),b=createEntry({title:"B",author:"Me"});assert(a.id!==b.id);});
  test("groupByDay: groups correctly",()=>{const es=[{id:"1",timestamp:"2025-11-01T06:00:00Z",title:"A",author:"Me",mood:"😊",location:"",description:""},{id:"2",timestamp:"2025-11-01T18:00:00Z",title:"B",author:"Me",mood:"😊",location:"",description:""},{id:"3",timestamp:"2025-11-02T09:00:00Z",title:"C",author:"Me",mood:"😊",location:"",description:""}];const g=groupByDay(es);assertEq(g.length,2);assertEq(g[0].entries.length,2);});
  test("exportSRT: empty returns empty",()=>assertEq(exportSRT([]),""));
  test("exportSRT: has subtitle index",()=>assertContains(exportSRT([createEntry({title:"X",author:"Me"})]),"1\n"));
  test("exportSRT: has title",()=>assertContains(exportSRT([createEntry({title:"Grey Glacier",author:"Me"})]),"Grey Glacier"));
  test("exportSRT: timestamp format",()=>assertContains(exportSRT([createEntry({title:"X",author:"Me"})]),"00:00:00,000 --> 00:00:06,000"));
  test("exportScript: empty returns empty",()=>assertEq(exportScript([]),""));
  test("exportScript: has header",()=>assertContains(exportScript([createEntry({title:"X",author:"Me"})]),"TORRES DEL PAINE"));
  test("exportScript: has SCENE 1",()=>assertContains(exportScript([createEntry({title:"X",author:"Me"})]),"SCENE 1"));
  test("exportScript: has clip filename",()=>assertContains(exportScript([createEntry({title:"X",author:"Me",videoClip:"VID.MOV"})]),"VID.MOV"));
  test("getStats: total count",()=>assertEq(getStats([createEntry({title:"A",author:"Me"}),createEntry({title:"B",author:"Husband"})]).total,2));
  test("getStats: by author",()=>{const s=getStats([createEntry({title:"A",author:"Me"}),createEntry({title:"B",author:"Husband"}),createEntry({title:"C",author:"Me"})]);assertEq(s.byAuthor["Me"],2);assertEq(s.byAuthor["Husband"],1);});
  test("getStats: top mood",()=>{const es=[createEntry({title:"A",author:"Me",mood:"😍"}),createEntry({title:"B",author:"Me",mood:"😍"}),createEntry({title:"C",author:"Me",mood:"🥶"})];assertEq(getStats(es).topMood,"😍");});
  test("getStats: empty returns zeros",()=>assertEq(getStats([]).total,0));
  test("filterEntries: by author",()=>assertEq(filterEntries([createEntry({title:"A",author:"Me"}),createEntry({title:"B",author:"Husband"})],{author:"Me"}).length,1));
  test("filterEntries: text search",()=>assertEq(filterEntries([createEntry({title:"waterfall",author:"Me"}),createEntry({title:"camp",author:"Me"})],{search:"waterfall"}).length,1));
  test("filterEntries: case insensitive",()=>assertEq(filterEntries([createEntry({title:"Waterfall",author:"Me"})],{search:"WATERFALL"}).length,1));

  return results;
}

let recognition = null;
let isRecording = false;
let rawTranscript = "";

async function translateWithClaude(text) {
  const statusEl = document.getElementById("voice-status");
  const rawEl = document.getElementById("voice-raw");
  statusEl.textContent = "🔄 Translating…";
  try {
    // MyMemory free translation API — no key, no CORS issues
    const url = "https://api.mymemory.translated.net/get?q=" + encodeURIComponent(text) + "&langpair=zh-CN|en-GB";
    const res = await fetch(url);
    const data = await res.json();
    const translated = data.responseData?.translatedText || "";
    if (translated && translated !== text) {
      const textarea = document.getElementById("desc-textarea");
      const existing = textarea.value.trim();
      // Keep both: translated English + original Mandarin
      textarea.value = (existing ? existing + "\n\n" : "") + translated + "\n\n[原文 / Original: " + text + "]";
      rawEl.classList.remove("show");
      statusEl.textContent = "✅ Translated! Original Mandarin kept below.";
    } else {
      const textarea = document.getElementById("desc-textarea");
      const existing = textarea.value.trim();
      textarea.value = (existing ? existing + "\n\n" : "") + text;
      statusEl.textContent = "✅ Spoken text added — edit as needed.";
    }
  } catch(e) {
    const textarea = document.getElementById("desc-textarea");
    const existing = textarea.value.trim();
    textarea.value = (existing ? existing + "\n\n" : "") + text;
    statusEl.textContent = "⚠️ Translation unavailable — original text added.";
  }
}

function startVoice() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    document.getElementById("voice-status").textContent = "⚠️ Voice not supported on this browser";
    return;
  }
  const statusEl = document.getElementById("voice-status");
  const btn = document.getElementById("voice-btn");
  const tBtn = document.getElementById("translate-btn");

  if (isRecording) {
    recognition.stop();
    return;
  }

  recognition = new SpeechRecognition();
  recognition.lang = "zh-TW"; // Traditional Chinese / Mandarin
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    isRecording = true;
    btn.classList.add("recording");
    btn.textContent = "⏹";
    statusEl.textContent = "🎤 Listening in Mandarin… tap ⏹ to stop";
    tBtn.disabled = true;
  };

  recognition.onresult = (e) => {
    const interim = Array.from(e.results).map(r => r[0].transcript).join("");
    statusEl.textContent = "🎤 " + interim;
    if (e.results[e.results.length - 1].isFinal) {
      rawTranscript = interim;
    }
  };

  recognition.onend = () => {
    isRecording = false;
    btn.classList.remove("recording");
    btn.textContent = "🎤";
    if (rawTranscript) {
      statusEl.textContent = "✅ Heard: " + rawTranscript + " — tap 🌐 to translate";
      tBtn.disabled = false;
    } else {
      statusEl.textContent = "Nothing heard. Try again.";
    }
  };

  recognition.onerror = (e) => {
    isRecording = false;
    btn.classList.remove("recording");
    btn.textContent = "🎤";
    statusEl.textContent = "⚠️ " + e.error + ". Try again.";
  };

  recognition.start();
}

function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs) for(const[k,v] of Object.entries(attrs)){
    if(k==="class") el.className=v;
    else if(k.startsWith("on")&&typeof v==="function") el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="style"&&typeof v==="object") Object.assign(el.style,v);
    else if(k==="disabled"&&v) el.disabled=true;
    else if(k!=="disabled") el.setAttribute(k,v);
  }
  for(const c of children.flat(Infinity)){
    if(c==null||c===false) continue;
    el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);
  }
  return el;
}

    // Re-render only the cards area, not the input
    const cardsEl = document.getElementById("j-cards");
    if(cardsEl) cardsEl.replaceWith(buildCards(this.value, filterAuthor));
  });
  wrap.appendChild(h("div",{class:"search-wrap"},h("span",{class:"search-ico"},"🔍"),searchInput));
  wrap.appendChild(h("div",{class:"filter-row"},
    ...["","Me","Husband"].map(a=>h("button",{class:`fchip${filterAuthor===a?" on":""}`,onClick:()=>{filterAuthor=a;setTab("journey");}},a||"All"))
  ));
  wrap.appendChild(buildCards("",filterAuthor));
  return wrap;
}

function buildCards(search, author){
  const visible=filterEntries(entries,{author:author||undefined,search:search||undefined});
  const groups=groupByDay(visible);
  const container=h("div",{id:"j-cards"});
  if(!visible.length){
    container.appendChild(h("div",{class:"empty"},h("div",{class:"empty-ico"},"🏔️"),h("div",{class:"empty-t"},"No moments yet"),h("div",{class:"empty-s"},entries.length===0?"Start logging your trek":"No entries match your search")));
  } else {
    groups.forEach(g=>{
      const grp=h("div",{class:"day-grp"},
        h("div",{class:"day-lbl"},h("span",{class:"day-num"},"Day "+g.dayNumber+" "),formatDate(g.entries[0].timestamp))
      );
      g.entries.forEach((e,i)=>{
        const card=h("div",{class:`card ${e.author==="Me"?"me":"hus"}`,style:{animationDelay:(i*0.04)+"s"}},
          h("span",{class:`badge ${e.author==="Me"?"bme":"bhus"}`},e.author==="Me"?"👩 Me":"👨 Husband"),
          h("div",{class:"card-title"},e.mood+" "+e.title),
          h("div",{class:"card-meta"},formatTime(e.timestamp)+(e.location?" · 📍 "+e.location:"")),
          e.description?h("div",{class:"card-desc"},e.description):null,
          e.videoClip?h("div",{class:"card-clip"},"📹 "+e.videoClip):null,
          (()=>{
            const media = e.media && e.media.length ? e.media : (e.photo?[{type:"image",data:e.photo}]:[]);
            if(!media.length) return null;
            if(media.length===1){
              const m=media[0];
              if(m.type==="video"){
                const v=document.createElement("video");
                v.src=m.data||m; v.controls=true; v.className="card-video"; v.preload="metadata";
                return v;
              }
              return h("img",{src:m.data||m,alt:e.title,class:"card-photo"});
            }
            const grid=h("div",{class:"card-media-grid"});
            media.forEach(m=>{
              if(m.type==="video"){
                const v=document.createElement("video");
                v.src=m.data||m; v.controls=true; v.preload="metadata"; v.muted=true;
                grid.appendChild(v);
              } else {
                grid.appendChild(h("img",{src:m.data||m,alt:e.title}));
              }
            });
            return grid;
          })()
        );
        const delBtn=h("button",{class:"btn-d",onClick:()=>{entries=entries.filter(x=>x.id!==e.id);try{localStorage.setItem("ptj_v4",JSON.stringify(entries));}catch(ex){}renderShell();}},"🗑 Remove entry");
        card.appendChild(delBtn);
        grp.appendChild(card);
      });
      container.appendChild(grp);
    });
  }
  return container;
}

function renderStats(){
  const s=getStats(entries);
  if(!entries.length) return h("div",{class:"scroll"},h("div",{class:"empty"},h("div",{class:"empty-ico"},"📊"),h("div",{class:"empty-t"},"No data yet"),h("div",{class:"empty-s"},"Log some moments to see trek stats")));
  return h("div",{class:"scroll"},
    h("div",{class:"stats-grid"},
      ...[[s.total,"Total Moments"],[s.days,"Days Active"],[s.clips,"Video Clips"],[s.photos,"Photos"]].map(([n,l])=>h("div",{class:"stat-box"},h("span",{class:"sbn"},n),h("span",{class:"sbl"},l)))
    ),
    s.topMood?h("div",{class:"stat-box",style:{marginBottom:"12px",textAlign:"center",padding:"16px"}},h("span",{style:{fontSize:"32px"}},s.topMood),h("span",{class:"sbl",style:{display:"block",marginTop:"4px"}},"Top Mood")):null,
    h("div",{class:"author-bar"},
      h("h4",null,"Moments by Explorer"),
      ...Object.entries(s.byAuthor).map(([name,count])=>h("div",{class:"bar-row"},
        h("span",{class:"bar-name"},name==="Me"?"👩 Me":"👨 Husband"),
        h("div",{class:"bar-track"},h("div",{class:`bar-fill ${name==="Me"?"bfme":"bfhus"}`,style:{width:((count/s.total)*100)+"%"}})),
        h("span",{class:"bar-c"},count)
      ))
    )
  );
}

function renderExport(){
  if(!entries.length) return h("div",{class:"scroll"},h("div",{class:"empty"},h("div",{class:"empty-ico"},"🎬"),h("div",{class:"empty-t"},"Nothing to export yet"),h("div",{class:"empty-s"},"Log your moments first")));
  const srt=exportSRT(entries);
  const script=exportScript(entries);
  return h("div",{class:"scroll"},
    h("div",{class:"exp-block"},
      h("h3",null,"🎬 CapCut Video Script"),
      h("p",null,"Scene-by-scene guide matching each moment to your iPad video clip."),
      h("button",{class:"btn btn-g",onClick:()=>{showScript=!showScript;setTab("export");}},showScript?"Hide":"Preview script"),
      showScript?h("div",{class:"code-box"},script):null,
      h("button",{class:"btn btn-i",onClick:()=>download(script,"patagonia-script.txt")},"⬇ Download Script (.txt)")
    ),
    h("div",{class:"exp-block"},
      h("h3",null,"🎞 SRT Subtitle File"),
      h("p",null,"Timed captions ready to import into CapCut or iMovie."),
      h("button",{class:"btn btn-g",onClick:()=>{showSRT=!showSRT;setTab("export");}},showSRT?"Hide":"Preview subtitles"),
      showSRT?h("div",{class:"code-box"},srt):null,
      h("button",{class:"btn btn-i",onClick:()=>download(srt,"patagonia-subtitles.srt")},"⬇ Download Subtitles (.srt)")
    ),
    h("div",{class:"exp-block"},
      h("h3",null,"📦 JSON Backup"),
      h("p",null,"Export all entries as JSON backup."),
      h("button",{class:"btn btn-i",onClick:()=>download(JSON.stringify(entries,null,2),"patagonia-journal.json")},"⬇ Download JSON Backup")
    ),
    h("div",{class:"tip"},"💡 CapCut workflow: Import iPad clips → arrange per Script → drop in .srt subtitles → add music → share! 🎥")
  );
}

function renderVideo(){
  const s = getStats(entries);
  const groups = groupByDay(entries);
  const totalMedia = entries.reduce((acc,e)=>acc+(e.media?e.media.length:(e.photo?1:0)),0);
  const videoEntries = entries.filter(e=>e.videoClip&&e.videoClip.trim());

  const steps = [
    {
      icon:"📲",
      title:"Step 1 — Import your iPad clips into CapCut",
      body:"Open CapCut on your iPhone. Tap 'New Project'. Select ALL your video clips from your iPad (use AirDrop or iCloud to transfer first). Arrange them roughly in chronological order."
    },
    {
      icon:"🗓",
      title:"Step 2 — Match clips to your Journal scenes",
      body:"In the Export tab, download your Video Script. Each [SCENE] lists the exact clip filename from your iPad. Match each CapCut clip to its scene — this gives your video a story arc across " + groups.length + " days."
    },
    {
      icon:"📸",
      title:"Step 3 — Insert your " + totalMedia + " photos as stills",
      body:"Between video clips, add your journal photos as 3–5 second stills. In CapCut: tap '+' between clips → Photos. This creates beautiful pause moments that show detail the video misses."
    },
    {
      icon:"💬",
      title:"Step 4 — Add subtitles from your .SRT file",
      body:"In CapCut: tap 'Text' → 'Auto Captions' → Import SRT. Select the patagonia-subtitles.srt file from your Export tab. Each journal moment becomes a timed caption — in both English and your original Mandarin."
    },
    {
      icon:"🎵",
      title:"Step 5 — Add Patagonian atmosphere music",
      body:"Recommended free tracks: search 'Patagonia ambient' or 'Andean wind' on CapCut's built-in music library. Set volume to ~20% so narration stays clear. Add a gentle fade-in and fade-out."
    },
    {
      icon:"✨",
      title:"Step 6 — Colour grade for Patagonia mood",
      body:"In CapCut: tap 'Filter' → try 'Cinema' or 'Vintage' presets. Then 'Adjust': drop Highlights slightly, lift Shadows, boost Teal in HSL to make the glaciers pop. The Torres del Paine light is golden — protect it."
    },
    {
      icon:"🎬",
      title:"Step 7 — Add a title card & end card",
      body:"First clip: add text overlay — 'Torres del Paine' in large serif font + your dates. Last clip: add 'The End' or a favourite quote from your journal. Export at 1080p or 4K."
    },
    {
      icon:"🌏",
      title:"Step 8 — Share with friends",
      body:"Export from CapCut → Save to Camera Roll. Share via WhatsApp, WeChat, or upload to YouTube/Instagram. Your " + s.total + " logged moments become the backbone of an unforgettable " + groups.length + "-day story."
    }
  ];

  const wrap = h("div",{class:"scroll"});

  // Hero summary
  wrap.appendChild(h("div",{style:{background:"var(--surf)",border:"1px solid var(--borderG)",borderRadius:"4px",padding:"16px",marginBottom:"16px",textAlign:"center"}},
    h("div",{style:{fontSize:"32px",marginBottom:"8px"}},"🎬"),
    h("div",{style:{fontFamily:"'Libre Baskerville',serif",fontSize:"20px",color:"var(--text)",marginBottom:"6px"}},"Your Trek Film"),
    h("div",{style:{fontSize:"11px",color:"var(--dim)",lineHeight:"1.7"}},
      s.total+" moments · "+groups.length+" days · "+totalMedia+" photos & videos · "+videoEntries.length+" named clips"
    ),
    s.total===0?h("div",{style:{fontSize:"11px",color:"var(--gold)",marginTop:"8px",fontStyle:"italic"}},"Start logging moments first to build your film!"):null
  ));

  // Step cards
  steps.forEach((step,i)=>{
    wrap.appendChild(h("div",{style:{background:"var(--surf)",border:"1px solid var(--border)",borderRadius:"4px",padding:"16px",marginBottom:"10px",display:"flex",gap:"14px",alignItems:"flex-start"}},
      h("div",{style:{fontSize:"26px",flexShrink:"0",marginTop:"2px"}},step.icon),
      h("div",null,
        h("div",{style:{fontFamily:"'Libre Baskerville',serif",fontSize:"14px",color:"var(--text)",marginBottom:"6px",lineHeight:"1.3"}},step.title),
        h("div",{style:{fontSize:"11px",color:"var(--muted)",lineHeight:"1.65"}},step.body)
      )
    ));
  });

  // Quick links to Export
  wrap.appendChild(h("div",{class:"tip",style:{marginTop:"4px"}},
    "💡 Ready to start? Go to the ",
    h("strong",{style:{color:"var(--gold)",cursor:"pointer"},onClick:()=>setTab("export")},"🎬 Export tab"),
    " to download your Video Script and SRT subtitles, then follow the steps above in CapCut."
  ));

  return wrap;
}

function renderTDD(){
  const tr=testResults;
  const passed=tr?tr.filter(t=>t.pass).length:0;
  return h("div",{class:"scroll"},
    h("div",{class:"tdd-h"},"TDD Suite"),
    h("div",{class:"tdd-s"},"38 tests across 5 modules, all written before implementation."),
    h("button",{class:"btn btn-p",onClick:()=>{testResults=runTests();setTab("tdd");}},"▶ Run All Tests"),
    tr?[
      h("div",{style:{marginTop:"20px"}},
        ...tr.map((t,i)=>h("div",{class:`t-item ${t.pass?"t-pass":"t-fail"}`,style:{animationDelay:(i*0.02)+"s"}},
          h("span",{style:{flexShrink:"0"}},t.pass?"✅":"❌"),
          h("div",null,h("div",{class:"t-name"},t.name),t.pass?null:h("div",{class:"t-err"},t.error))
        ))
      ),
      h("div",{class:"tdd-sum"},`${passed} / ${tr.length} passing ${tr.every(t=>t.pass)?"— All green ✦":""}`)
    ]:null,
    h("div",{class:"cycle"},
      h("h4",null,"The TDD Cycle — Red · Green · Refactor"),
      h("div",{class:"cy-row"},h("div",{class:"dot dr"},"1"),h("div",null,h("strong",{style:{color:"#d4886a"}},"Red")," — Write a failing test first.")),
      h("div",{class:"cy-row"},h("div",{class:"dot dg"},"2"),h("div",null,h("strong",{style:{color:"#7aab62"}},"Green")," — Write minimum code to pass.")),
      h("div",{class:"cy-row"},h("div",{class:"dot db"},"3"),h("div",null,h("strong",{style:{color:"#7ab4c4"}},"Refactor")," — Clean up while keeping tests green."))
    )
  );
}

renderShell();
